<!DOCTYPE html>
<html lang="es">

<head>
  <!--
  ARCHIVO: /auth/login.html
  VERSIÓN: v2.0
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Iniciar Sesión — EduCoins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #07071a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image: linear-gradient(rgba(124, 58, 237, .03) 1px, transparent 1px), linear-gradient(90deg, rgba(124, 58, 237, .03) 1px, transparent 1px);
      background-size: 50px 50px
    }

    .auth-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 480px
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: .875rem;
      text-decoration: none
    }

    .logo-box {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      animation: logoPulse 3s ease-in-out infinite
    }

    @keyframes logoPulse {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(124, 58, 237, .4)
      }

      50% {
        box-shadow: 0 0 50px rgba(124, 58, 237, .8), 0 0 80px rgba(6, 182, 212, .3)
      }
    }

    .logo-name {
      font-family: 'Press Start 2P', monospace;
      font-size: .85rem;
      color: #a855f7;
      display: block
    }

    .logo-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: .4rem;
      color: #06b6d4;
      display: block;
      margin-top: 5px
    }

    #clerk-sign-in {
      width: 100%;
      min-height: 80px
    }

    .auth-footer {
      font-size: .875rem;
      color: #94a3b8;
      font-weight: 700;
      text-align: center
    }

    .auth-footer a {
      color: #a855f7;
      text-decoration: none
    }

    .auth-footer a:hover {
      text-decoration: underline
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2.5rem;
      color: #64748b;
      font-size: .875rem;
      font-weight: 700
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(124, 58, 237, .2);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>

  <!-- SDK de Clerk -->
  <script data-clerk-publishable-key="pk_test_bG92aW5nLXJhcHRvci0xLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://lovable-raptor-1.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous"></script>

</head>

<body>

  <div class="auth-wrap">
    <a href="../index.html" class="auth-logo">
      <div class="logo-box">🎓</div>
      <div>
        <span class="logo-name">EduCoins</span>
        <span class="logo-sub">Aprende &amp; Gana</span>
      </div>
    </a>

    <div id="clerk-sign-in">
      <div class="spinner-wrap">
        <div class="spinner"></div>
        Cargando login...
      </div>
    </div>

    <div class="auth-footer">
      ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
    </div>
  </div>

  <script src="clerk-config.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      var base = window.EDUCOINS_BASE || '';

      if (typeof window.Clerk === 'undefined') {
        mostrarError('Sin conexión al servicio de login. Verifica tu internet.');
        return;
      }

      try {
        await window.Clerk.load();
      } catch (err) {
        console.error('[login] Error Clerk.load():', err);
        mostrarFormulario();
        return;
      }

      if (window.Clerk.user) {
        window.location.href = base + '/dashboard/dashboard.html';
        return;
      }

      // Mostrar formulario custom siempre (para tener control total del idioma)
      mostrarFormulario();

      function mostrarError(msg) {
        document.getElementById('clerk-sign-in').innerHTML =
          '<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);border-radius:12px;padding:1.5rem;color:#fca5a5;font-weight:700;line-height:1.7;text-align:center">⚠️ ' + msg + '</div>';
      }

      function mostrarFormulario() {
        document.getElementById('clerk-sign-in').innerHTML =
          '<div style="background:#0f0f2e;border:1px solid rgba(124,58,237,0.3);border-radius:20px;padding:2rem;box-shadow:0 0 60px rgba(124,58,237,0.15)">' +
          '<div style="font-family:\'Press Start 2P\',monospace;font-size:.5rem;color:#a855f7;margin-bottom:1.5rem;text-align:center">INICIAR SESIÓN</div>' +

          '<div style="margin-bottom:1rem">' +
          '<label style="display:block;font-size:.72rem;font-weight:800;color:#94a3b8;margin-bottom:.4rem">CORREO ELECTRÓNICO</label>' +
          '<input id="loginEmail" type="email" placeholder="tu@correo.com" style="width:100%;background:#1a1a3e;border:1px solid rgba(124,58,237,0.3);border-radius:10px;padding:.75rem 1rem;color:#e2e8f0;font-size:.95rem;font-family:Nunito,sans-serif;outline:none"/>' +
          '</div>' +

          '<div style="margin-bottom:.5rem">' +
          '<label style="display:block;font-size:.72rem;font-weight:800;color:#94a3b8;margin-bottom:.4rem">CONTRASEÑA</label>' +
          '<div style="position:relative">' +
          '<input id="loginPassword" type="password" placeholder="••••••••" style="width:100%;background:#1a1a3e;border:1px solid rgba(124,58,237,0.3);border-radius:10px;padding:.75rem 3rem .75rem 1rem;color:#e2e8f0;font-size:.95rem;font-family:Nunito,sans-serif;outline:none"/>' +
          '<button type="button" id="togglePassword" onclick="togglePasswordVisibility()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.2rem;padding:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center">👁️</button>' +
          '</div>' +
          '</div>' +

          '<div style="text-align:right;margin-bottom:1.5rem">' +
          '<a href="#" onclick="recuperarContrasena(); return false;" style="font-size:.75rem;color:#a855f7;text-decoration:none;font-weight:700">¿Olvidaste tu contraseña?</a>' +
          '</div>' +

          '<div id="loginError" style="display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:.75rem;color:#fca5a5;font-size:.8rem;font-weight:700;margin-bottom:1rem;text-align:center"></div>' +

          '<button id="loginBtn" onclick="hacerLogin()" style="width:100%;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:12px;padding:.875rem;color:#fff;font-family:\'Press Start 2P\',monospace;font-size:.45rem;cursor:pointer;box-shadow:0 4px 20px rgba(124,58,237,.4);margin-bottom:1rem">▶ ENTRAR</button>' +

          '<div style="margin:1.25rem 0;display:flex;align-items:center;gap:.75rem"><div style="flex:1;height:1px;background:rgba(255,255,255,.1)"></div><span style="color:#64748b;font-size:.75rem;font-weight:700">O</span><div style="flex:1;height:1px;background:rgba(255,255,255,.1)"></div></div>' +

          '<button onclick="loginGoogle()" style="width:100%;background:#fff;border:none;border-radius:12px;padding:.875rem;color:#1a1a1a;font-family:Nunito,sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:1rem"><img src="https://www.google.com/favicon.ico" style="width:18px;height:18px"> Entrar con Google</button>' +

          '<div style="text-align:center;font-size:.8rem;color:#64748b;font-weight:700">¿No tienes cuenta? <a href="registro.html" style="color:#a855f7;text-decoration:none">Regístrate</a></div>' +

          '</div>';

        // Enter para submit
        setTimeout(function () {
          var pw = document.getElementById('loginPassword');
          if (pw) pw.addEventListener('keydown', function (e) { if (e.key === 'Enter') hacerLogin(); });
          var em = document.getElementById('loginEmail');
          if (em) em.addEventListener('keydown', function (e) { if (e.key === 'Enter') hacerLogin(); });
        }, 100);
      }
    });

    // ═══════════════════════════════════════════════════════════
    // FUNCIONES GLOBALES
    // ═══════════════════════════════════════════════════════════

    function togglePasswordVisibility() {
      var input = document.getElementById('loginPassword');
      var button = document.getElementById('togglePassword');

      if (input && button) {
        if (input.type === 'password') {
          input.type = 'text';
          button.textContent = '🙈';
        } else {
          input.type = 'password';
          button.textContent = '👁️';
        }
      }
    }

    async function loginGoogle() {
      var base = window.EDUCOINS_BASE || '';
      try {
        await window.Clerk.client.signIn.authenticateWithRedirect({
          strategy: 'oauth_google',
          redirectUrl: base + '/auth/sso-callback.html',
          redirectUrlComplete: base + '/dashboard/dashboard.html',
        });
      } catch (err) {
        console.error('[login] Google OAuth error:', err);
        alert('Error al conectar con Google. Intenta recargar la página.');
      }
    }

    async function hacerLogin() {
      var base = window.EDUCOINS_BASE || '';
      var email = document.getElementById('loginEmail').value.trim();
      var password = document.getElementById('loginPassword').value;
      var errorEl = document.getElementById('loginError');
      var btn = document.getElementById('loginBtn');

      if (!email || !password) {
        errorEl.textContent = 'Completa todos los campos';
        errorEl.style.display = 'block';
        return;
      }

      btn.textContent = '⏳ Entrando...';
      btn.disabled = true;
      errorEl.style.display = 'none';

      try {
        var result = await window.Clerk.client.signIn.create({
          identifier: email,
          password: password,
        });

        if (result.status === 'complete') {
          await window.Clerk.setActive({ session: result.createdSessionId });
          // Limpiar localStorage antes de redirigir para forzar carga fresca
          try {
            localStorage.removeItem('educoins_perfil_v1');
          } catch (e) { }
          window.location.href = base + '/dashboard/dashboard.html';
        } else {
          errorEl.textContent = 'Se requiere verificación adicional.';
          errorEl.style.display = 'block';
          btn.textContent = '▶ ENTRAR';
          btn.disabled = false;
        }
      } catch (err) {
        console.error('[login] Error:', err);
        var msg = 'Correo o contraseña incorrectos';

        if (err.errors && err.errors[0]) {
          var clerkError = err.errors[0];
          if (clerkError.code === 'form_identifier_not_found') {
            msg = 'No existe una cuenta con este correo';
          } else if (clerkError.code === 'form_password_incorrect') {
            msg = 'Contraseña incorrecta';
          } else if (clerkError.code === 'session_exists') {
            msg = 'Ya tienes una sesión activa';
          } else {
            msg = clerkError.longMessage || clerkError.message || msg;
          }
        }

        errorEl.textContent = msg;
        errorEl.style.display = 'block';
        btn.textContent = '▶ ENTRAR';
        btn.disabled = false;
      }
    }

    async function recuperarContrasena() {
      var email = document.getElementById('loginEmail').value.trim();
      var errorEl = document.getElementById('loginError');

      if (!email) {
        errorEl.textContent = 'Ingresa tu correo primero para recuperar la contraseña';
        errorEl.style.display = 'block';
        return;
      }

      // Validar formato de email
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent = 'Ingresa un correo válido';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';

      try {
        // Iniciar proceso de recuperación de contraseña con Clerk
        await window.Clerk.client.signIn.create({
          identifier: email,
          strategy: 'reset_password_email_code',
        });

        // Mostrar mensaje de éxito
        document.getElementById('clerk-sign-in').innerHTML =
          '<div style="background:#0f0f2e;border:1px solid rgba(124,58,237,0.3);border-radius:20px;padding:2rem;box-shadow:0 0 60px rgba(124,58,237,0.15);text-align:center">' +
          '<div style="font-size:3rem;margin-bottom:1rem">📧</div>' +
          '<div style="font-family:\'Press Start 2P\',monospace;font-size:.5rem;color:#a855f7;margin-bottom:1rem">CORREO ENVIADO</div>' +
          '<div style="font-size:.9rem;color:#94a3b8;font-weight:700;line-height:1.7;margin-bottom:1.5rem">Te hemos enviado un correo con instrucciones para restablecer tu contraseña a:<br><strong style="color:#e2e8f0">' + email + '</strong></div>' +
          '<div style="font-size:.8rem;color:#64748b;font-weight:700;margin-bottom:1.5rem">Revisa tu bandeja de entrada y spam</div>' +
          '<button onclick="location.reload()" style="width:100%;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:12px;padding:.875rem;color:#fff;font-family:\'Press Start 2P\',monospace;font-size:.45rem;cursor:pointer;box-shadow:0 4px 20px rgba(124,58,237,.4)">◀ VOLVER AL LOGIN</button>' +
          '</div>';

      } catch (err) {
        console.error('[login] Error recuperar contraseña:', err);
        var msg = 'Error al enviar el correo de recuperación';

        if (err.errors && err.errors[0]) {
          var clerkError = err.errors[0];
          if (clerkError.code === 'form_identifier_not_found') {
            msg = 'No existe una cuenta con este correo';
          } else {
            msg = clerkError.longMessage || clerkError.message || msg;
          }
        }

        errorEl.textContent = msg;
        errorEl.style.display = 'block';
      }
    }
  </script>

</body>

</html>
